version: "3.9"

services:
  redis:
    image: "redis:6.2.6-alpine"
    restart: unless-stopped

  web0:
    image: "local/redis_lock_example_web"
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - .:/code
    ports:
      - "5000:5000"
    depends_on:
      - redis

  web1:
    image: "local/redis_lock_example_web"
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - .:/code
    ports:
      - "5001:5000"
    depends_on:
      - redis

  web2:
    image: "local/redis_lock_example_web"
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - .:/code
    ports:
      - "5002:5000"
    depends_on:
      - redis

networks:
  default:
    name: my-compose-network
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.80.0.0/24
